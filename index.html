<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Album</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="album-panel" aria-label="Album overview">
        <div class="brand-lockup">
          <span class="brand-mark">VA</span>
          <div>
            <p class="eyebrow">Season 01</p>
            <h1>Virtual Album</h1>
          </div>
        </div>

        <section class="progress-block" aria-label="Collection progress">
          <div class="progress-copy">
            <span id="collected-count">0</span>
            <span>of</span>
            <span id="total-count">12</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span id="progress-bar"></span>
          </div>
          <p id="rarity-summary">Start your collection</p>
        </section>

        <div class="pack">
          <div class="pack-art" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <button id="open-pack" class="primary-action" type="button">
            <span aria-hidden="true">+</span>
            Open pack
          </button>
        </div>

        <nav class="filter-list" aria-label="Album filters">
          <button class="filter-button is-active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="collected">Collected</button>
          <button class="filter-button" type="button" data-filter="missing">Missing</button>
          <button class="filter-button" type="button" data-filter="rare">Rare</button>
        </nav>
      </aside>

      <section class="album-stage" aria-label="Sticker album">
        <header class="stage-header">
          <div>
            <p class="eyebrow">Gallery</p>
            <h2>Legends & Moments</h2>
          </div>
          <div class="view-tools" aria-label="Album tools">
            <button id="complete-album" class="tool-button" type="button" title="Complete album">OK</button>
            <button id="reset-album" class="tool-button" type="button" title="Reset album">R</button>
          </div>
        </header>

        <div id="album-grid" class="album-grid" aria-live="polite"></div>
      </section>
    </main>

    <dialog id="pack-dialog" class="pack-dialog">
      <div class="dialog-head">
        <p class="eyebrow">New pack</p>
        <button id="close-dialog" class="tool-button" type="button" aria-label="Close">x</button>
      </div>
      <div id="pack-results" class="pack-results"></div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
