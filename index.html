<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Album</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="album-panel" aria-label="Album overview">
        <div class="brand-lockup">
          <span class="brand-mark">VA</span>
          <div>
            <p class="eyebrow">Season 01</p>
            <h1>Virtual Album</h1>
          </div>
        </div>

        <div class="">
          <button id="albumStageBtn" class="primary-action" type="submit">Album</button>
          <button id="leaderboardStageBtn" class="primary-action" type="submit">Leaderboard</button>
          <button id="tradingStageBtn" class="primary-action">Trading</button>
        </div>

        <section class="auth-panel" aria-label="Account">
          <div id="auth-form-panel">
            <p class="eyebrow">Account</p>
            <form id="auth-form" class="auth-form">
              <label>
                Username
                <input id="username-input" name="username" type="text" autocomplete="username" required />
              </label>
              <label>
                Password
                <input
                  id="password-input"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  required
                />
              </label>
              <div class="auth-actions">
                <button id="login-button" class="primary-action" type="submit">Sign in</button>
                <button id="register-button" class="secondary-action" type="button">Register</button>
              </div>
              <p id="auth-message" class="auth-message" role="status"></p>
            </form>
          </div>

          <div id="user-panel" class="user-panel is-hidden">
            <p class="eyebrow">Signed in</p>
            <div class="user-row">
              <strong id="current-username"></strong>
              <button id="logout-button" class="secondary-action" type="button">Sign out</button>
            </div>
          </div>
        </section>

        <section class="progress-block" aria-label="Collection progress">
          <div class="progress-copy">
            <span id="collected-count">0</span>
            <span>of</span>
            <span id="total-count">12</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span id="progress-bar"></span>
          </div>
          <p id="rarity-summary">Start your collection</p>
          <p id="database-status">
              Sign in to save cards
          </p>
        </section>

        <div class="pack">
            <div class="pack-art" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <button id="open-pack" class="primary-action" type="button">
                <span aria-hidden="true">+</span>
                Open pack
            </button>
        </div>
      </aside>

      <section id="album-stage" class="album-stage stage" aria-label="Sticker album">
        <header class="stage-header">
          <div>
            <p class="eyebrow">Stickers</p>
            <h2 id="teams" >Legends & Moments</h2>
          </div>
          <div id="admin-tools" class="view-tools is-hidden" aria-label="Album tools">
              <button id="complete-album" class="tool-button" type="button" title="Complete album">OK</button>
              <button id="reset-album" class="tool-button" type="button" title="Reset album">R</button>
              <button id="get-pack" class="tool-button" type="button" title="Get pack">P</button>
          </div>
          <nav class="filter-list" aria-label="Album filters">
            <button class="filter-button is-active" type="button" data-filter="next">Next team</button>
            <button class="filter-button" type="button" data-filter="prev">Previous team</button>
          </nav>
        </header>

        <div id="album-grid" class="album-grid" aria-live="polite"></div>
      </section>

      <section id="leaderboard-stage" class="leaderboard-stage stage is-hidden">
        <header class="stage-header">
          <div>
            <p class="eyebrow">Leaderboard</p>
            <h2>Top Collectors</h2>
          </div>
        </header>
        <div class="ranking-list">
          <!-- Ranking content goes here -->
          <p>Ranking content is coming soon...</p>
        </div>
      </section>

      <section id="trading-stage" class="trading-stage stage is-hidden">
        <header class="stage-header">
          <div class="trading-stage-header">
            <div>
              <p class="eyebrow">Scan QR code</p>
              <h2 >Trading</h2>
            </div>
            <button id="tradingNotificationsBtn">
              <span class="notification-badge">3</span>
              <div id="notificationsDropdown" class="ai-style-change-1" style="display: none;">
                <div style="font-weight: bold; border-bottom: 1px solid #eee; margin-bottom: 8px; padding-bottom: 4px;">Notifications</div>
                <div style="font-size: 14px;">No new notifications</div>
                <div style="font-size: 14px;">No new notifications</div>
              </div>
            </button>
          </div>
        </header>
        <div id="qrCode"></div>
        <button id="scanQRBtn" class="primary-action" type="submit">Scan QR code</button>
        <button id="generateQRBtn" class="primary-action">Generate QR code</button>
      </section>
    </main>

    <dialog id="pack-dialog" class="pack-dialog">
      <div class="dialog-head">
        <p class="eyebrow">New pack</p>
        <button id="close-dialog" class="tool-button" type="button" aria-label="Close">x</button>
      </div>
      <div id="pack-results" class="pack-results"></div>
    </dialog>

    <script src="script.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  </body>
</html>
